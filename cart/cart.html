<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Carrito estilo Apple</title>
    
    <!-- PASO 1: IMPORTANTE - Añadir jQuery en el carrito para que funcione la lógica -->
    <script src="https://jquery.com"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 40px; color: #1d1d1f; background: #f5f5f7; }
        .contenedor-principal { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 18px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        h1 { font-size: 40px; font-weight: 700; letter-spacing: -0.003em; margin-bottom: 30px; }
        .item-carrito { display: flex; justify-content: space-between; border-bottom: 1px solid #d2d2d7; padding: 20px 0; font-size: 17px; }
        .resumen { margin-top: 30px; text-align: right; }
        .btn-pagar { background: #0071e3; color: white; border: none; padding: 16px 32px; border-radius: 12px; cursor: pointer; font-size: 17px; font-weight: 600; }
        .btn-pagar:hover { background: #0077ed; }

        /* Estilos del Pop-up Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 35px; border-radius: 20px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e5e5ea; padding-bottom: 15px; margin-bottom: 20px; }
        .btn-cerrar { background: none; border: none; font-size: 24px; cursor: pointer; color: #86868b; }
        
        /* Detalles de cuenta en el Pop-up */
        .tabla-desglose { width: 100%; margin-bottom: 25px; border-collapse: collapse; }
        .tabla-desglose td { padding: 8px 0; font-size: 15px; color: #515154; }
        .tabla-desglose .fila-total { font-weight: 600; font-size: 18px; color: #1d1d1f; border-top: 1px solid #e5e5ea; }
        
        /* Formulario Bancario */
        .campo-formulario { margin-bottom: 16px; }
        .campo-formulario label { display: block; font-size: 12px; font-weight: 600; color: #86868b; margin-bottom: 6px; text-transform: uppercase; }
        .campo-formulario input { width: 100%; padding: 12px; border: 1px solid #d2d2d7; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
        .campo-formulario input:focus { border-color: #0071e3; outline: none; }
        .fila-doble { display: flex; gap: 15px; }
        .fila-doble .campo-formulario { flex: 1; }
        
        .aviso-academico { background: #fff9e6; border: 1px solid #ffe0b2; color: #b78103; padding: 12px; border-radius: 8px; font-size: 13px; text-align: center; margin-bottom: 20px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <h1>Revisa tu bolsa.</h1>
        
        <!-- Aquí se van a pintar los procesadores o memorias agregadas -->
        <div id="lista-productos"></div>

        <div class="resumen">
            <button class="btn-pagar" id="btn-abrir-pago">Proceder al pago</button>
        </div>
    </div>

    <!-- POP-UP FLOTANTE (MODAL) -->
    <div class="modal-overlay" id="modal-pago">
        <div class="modal-box">
            <div class="modal-header">
                <h2 style="margin:0; font-size: 24px;">Detalles del Pago</h2>
                <button class="btn-cerrar" id="btn-cerrar-pago">&times;</button>
            </div>

            <table class="tabla-desglose">
                <tbody>
                    <tr>
                        <td>Subtotal (Ventas):</td>
                        <td style="text-align: right;">$<span id="pop-subtotal">0.00</span></td>
                    </tr>
                    <tr>
                        <td>Envío:</td>
                        <td style="text-align: right;">$<span id="pop-envio">0.00</span></td>
                    </tr>
                    <tr class="fila-total">
                        <td style="padding-top:15px;">Total a pagar:</td>
                        <td style="padding-top:15px; text-align: right;">$<span id="pop-total">0.00</span></td>
                    </tr>
                </tbody>
            </table>

            <div class="aviso-academico">
                ⚠️ Demostración Académica: NO ingreses tarjetas reales.
            </div>

            <form id="form-pago-ficticio">
                <div class="campo-formulario">
                    <label>Nombre en la tarjeta</label>
                    <input type="text" placeholder="John Doe" required>
                </div>

                <div class="campo-formulario">
                    <label>Número de tarjeta de prueba</label>
                    <input type="text" placeholder="4242 4242 4242 4242" maxlength="19" required>
                </div>

                <div class="fila-doble">
                    <div class="campo-formulario">
                        <label>Vencimiento</label>
                        <input type="text" placeholder="MM/AA" maxlength="5" required>
                    </div>
                    <div class="campo-formulario">
                        <label>CVV</label>
                        <input type="password" placeholder="123" maxlength="4" required>
                    </div>
                </div>

                <div class="campo-formulario">
                    <label>Banco Remitente</label>
                    <input type="text" list="lista-bancos" placeholder="Escribe para buscar tu banco..." required>
                    <datalist id="lista-bancos">
                        <option value="BBVA"></option>
                        <option value="Santander"></option>
                        <option value="Citibanamex"></option>
                        <option value="Banorte"></option>
                        <option value="HSBC"></option>
                        <option value="Scotiabank"></option>
                    </datalist>
                </div>

                <button type="submit" class="btn-pagar" style="width:100%; margin-top:10px;">Finalizar Pago Simulado</button>
            </form>
        </div>
    </div>

    <script>
    $(document).ready(function() {
        // PASO 2: Leer el arreglo 'carrito' guardado en localStorage
        let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
        let subtotal = 0;

        // Limpiar contenedor por seguridad antes de agregar elementos
        $('#lista-productos').empty();

        if(carrito.length === 0) {
            $('#lista-productos').html('<p>Tu bolsa está vacía.</p>');
            $('#btn-abrir-pago').prop('disabled', true).css('background', '#a1a1a6');
        } else {
            // Recorrer e insertar cada objeto guardado
            carrito.forEach(function(producto) {
                subtotal += producto.precio;
                $('#lista-productos').append(`
                    <div class="item-carrito">
                        <span>${producto.nombre}</span>
                        <span>$${producto.precio.toFixed(2)}</span>
                    </div>
                `);
            });
        }

        let costoEnvio = subtotal > 100 || subtotal === 0 ? 0.00 : 10.00;
        let totalFinal = subtotal + costoEnvio;

        $('#btn-abrir-pago').click(function() {
            $('#pop-subtotal').text(subtotal.toFixed(2));
            $('#pop-envio').text(costoEnvio.toFixed(2));
            $('#pop-total').text(totalFinal.toFixed(2));
            $('#modal-pago').css('display', 'flex');
        });

        $('#btn-cerrar-pago').click(function() {
            $('#modal-pago').hide();
        });

        $('#modal-pago').click(function(e) {
            if ($(e.target).hasClass('modal-overlay')) {
                $(this).hide();
            }
        });

        $('#form-pago-ficticio').submit(function(e) {
            e.preventDefault();
            alert('Procesando pago de $' + totalFinal.toFixed(2) + ' de forma segura...');
            
            setTimeout(function() {
                alert('¡Pago Simulado Exitosamente! Gracias por tu compra escolar.');
                localStorage.removeItem('carrito');
                
                // PASO 3: Ruta corregida para salir de la carpeta cart/ y regresar al index.html de la raíz
                window.location.href = '../index.html';
            }, 2000);
        });
    });
    </script>
</body>
</html>
